theme = "onedark"
[editor]
true-color = true
color-modes = true

[editor.cursor-shape]
normal = "bar"
insert = "bar"
select = "block"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
C-n = "file_picker_in_current_directory"
