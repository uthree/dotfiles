# Username and hostname
[username]
style_user = 'blue bold'
style_root = 'red bold'
format = '[$user]($style) '
disabled = false
show_always = true

[hostname]
ssh_only = true
format = '@ [$hostname](bold blue)(bold blue) '
trim_at = '.companyname.com'
disabled = false

[directory]
format = 'in [$path]($style)[$read_only]($read_only_style) '
